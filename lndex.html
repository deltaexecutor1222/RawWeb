<div class="script">
  <p>Script Fly</p>

  <button onclick="toggle(this)">⋮</button>

  <div style="display:none;">
    <button onclick="copyRaw(this.dataset.raw)" data-raw="https://raw.githubusercontent.com/user/fly.lua">Copiar</button>
    <button onclick="this.closest('.script').remove()">Borrar</button>
  </div>
</div>

<div class="script">
  <p>Script Admin</p>

  <button onclick="toggle(this)">⋮</button>

  <div style="display:none;">
    <button onclick="copyRaw(this.dataset.raw)" data-raw="https://raw.githubusercontent.com/user/admin.lua">Copiar</button>
    <button onclick="this.closest('.script').remove()">Borrar</button>
  </div>
</div>

<script>
function toggle(btn) {
  let menu = btn.nextElementSibling;
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function copyRaw(raw) {
  let code = `loadstring(game:HttpGet("${raw}"))()`;
  navigator.clipboard.writeText(code);
  alert("Copiado ✔️");
}
</script>
